<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAM3 Video Labeling</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { 
            text-align: center; 
            margin-bottom: 30px;
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .upload-section {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
        }
        input[type="file"] {
            padding: 10px;
        }
        button {
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.02); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .status.loading { background: rgba(255,193,7,0.2); }
        .status.success { background: rgba(40,167,69,0.2); }
        .status.error { background: rgba(220,53,69,0.2); }
        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .frame-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
        }
        .frame-card img {
            width: 100%;
            display: block;
        }
        .frame-info {
            padding: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 SAM3 Video Labeling Tool</h1>
        
        <div class="upload-section">
            <div class="form-group">
                <label>📹 选择视频文件</label>
                <input type="file" id="videoFile" accept="video/*">
            </div>
            <div class="form-group">
                <label>✏️ 输入提示词（可选）</label>
                <input type="text" id="prompt" placeholder="描述你想标注的内容...">
            </div>
            <button id="processBtn" onclick="processVideo()">开始标注</button>
        </div>
        
        <div id="status"></div>
        <div id="results" class="results"></div>
    </div>
    
    <script>
        async function checkStatus() {
            const res = await fetch('/api/status');
            const data = await res.json();
            document.getElementById('status').innerHTML = 
                data.model_loaded ? 
                '<div class="status success">✅ 模型已加载: ' + data.model_name + '</div>' :
                '<div class="status loading">⏳ 等待模型加载...</div>';
        }
        checkStatus();
        
        async function processVideo() {
            const videoFile = document.getElementById('videoFile').files[0];
            const prompt = document.getElementById('prompt').value;
            const btn = document.getElementById('processBtn');
            const status = document.getElementById('status');
            const results = document.getElementById('results');
            
            if (!videoFile) {
                alert('请选择视频文件');
                return;
            }
            
            btn.disabled = true;
            status.innerHTML = '<div class="status loading">⏳ 上传并处理中...</div>';
            results.innerHTML = '';
            
            const formData = new FormData();
            formData.append('video', videoFile);
            formData.append('prompt', prompt);
            
            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (data.success) {
                    status.innerHTML = '<div class="status success">✅ 处理完成！生成 ' + data.frames.length + ' 帧标注</div>';
                    
                    data.frames.forEach(frame => {
                        results.innerHTML += `
                            <div class="frame-card">
                                <img src="${frame.image_url}" alt="Frame ${frame.frame_idx}">
                                <div class="frame-info">
                                    <strong>帧 #${frame.frame_idx}</strong>
                                    <p>${frame.mask_count} 个标注</p>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    status.innerHTML = '<div class="status error">❌ 错误: ' + data.error + '</div>';
                }
            } catch (e) {
                status.innerHTML = '<div class="status error">❌ 请求失败: ' + e.message + '</div>';
            }
            
            btn.disabled = false;
        }
    </script>
</body>
</html>
