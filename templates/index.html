<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAM3 视频智能标注工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .progress-bar {
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-extrabold text-indigo-600 mb-2">SAM3 视频智能标注工具</h1>
            <p class="text-gray-600">利用 Segment Anything Model 3 实现开放词汇视频对象分割</p>
        </header>

        <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg p-8">
            <!-- 上传区域 -->
            <div id="upload-section" class="space-y-6">
                <div class="border-2 border-dashed border-gray-300 rounded-lg p-12 text-center hover:border-indigo-500 transition-colors cursor-pointer" id="drop-zone">
                    <input type="file" id="video-input" class="hidden" accept="video/*">
                    <div class="flex flex-col items-center">
                        <svg class="w-16 h-16 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                        </svg>
                        <p class="text-lg text-gray-700 font-medium">拖拽视频文件或点击上传</p>
                        <p class="text-sm text-gray-500 mt-2">支持 MP4, AVI, MOV 等格式</p>
                        <p id="file-name" class="mt-4 text-indigo-600 font-bold hidden"></p>
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="prompt-input" class="block text-sm font-semibold text-gray-700">提示词 (Prompt)</label>
                    <input type="text" id="prompt-input" placeholder="例如: 'a person', 'blue car', 'the leftmost cat'" 
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                    <p class="text-xs text-gray-400 italic">SAM3 支持开放词汇分割，您可以输入任何想分割的物体名称</p>
                </div>

                <button id="start-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg shadow transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    开始处理视频
                </button>
            </div>

            <!-- 进度显示区域 -->
            <div id="progress-section" class="hidden space-y-6">
                <div class="text-center">
                    <h3 class="text-xl font-bold text-gray-800" id="status-text">正在初始化模型...</h3>
                </div>
                
                <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
                    <div id="progress-bar" class="progress-bar bg-indigo-600 h-full w-0"></div>
                </div>
                
                <div class="flex justify-between text-sm text-gray-500">
                    <span id="progress-percent">0%</span>
                    <span id="progress-detail">0 / 0 帧已处理</span>
                </div>

                <div class="bg-indigo-50 p-4 rounded-lg border border-indigo-100">
                    <p class="text-sm text-indigo-700" id="log-text">准备开始...</p>
                </div>
            </div>

            <!-- 结果区域 -->
            <div id="result-section" class="hidden space-y-6 text-center">
                <div class="p-6 bg-green-50 border border-green-200 rounded-lg">
                    <h3 class="text-xl font-bold text-green-700 mb-2">处理完成！</h3>
                    <p class="text-green-600">标注视频已生成完毕</p>
                </div>

                <div class="rounded-xl overflow-hidden shadow-md bg-black">
                    <video id="result-video" controls class="w-full max-h-[400px]">
                        您的浏览器不支持视频播放。
                    </video>
                </div>

                <div class="flex gap-4">
                    <a id="download-btn" href="#" download class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg shadow transition-colors">
                        下载标注好的视频
                    </a>
                    <button onclick="window.location.reload()" class="px-6 py-3 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
                        重新上传
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const videoInput = document.getElementById('video-input');
        const fileNameDisplay = document.getElementById('file-name');
        const promptInput = document.getElementById('prompt-input');
        const startBtn = document.getElementById('start-btn');
        const uploadSection = document.getElementById('upload-section');
        const progressSection = document.getElementById('progress-section');
        const resultSection = document.getElementById('result-section');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const progressDetail = document.getElementById('progress-detail');
        const statusText = document.getElementById('status-text');
        const logText = document.getElementById('log-text');
        const resultVideo = document.getElementById('result-video');
        const downloadBtn = document.getElementById('download-btn');

        let taskId = null;
        let pollingInterval = null;

        // 文件拖拽上传逻辑
        dropZone.onclick = () => videoInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('border-indigo-500'); };
        dropZone.ondragleave = () => { dropZone.classList.remove('border-indigo-500'); };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-indigo-500');
            if (e.dataTransfer.files.length > 0) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        };

        videoInput.onchange = () => {
            if (videoInput.files.length > 0) {
                handleFileSelect(videoInput.files[0]);
            }
        };

        function handleFileSelect(file) {
            fileNameDisplay.textContent = `已选择: ${file.name}`;
            fileNameDisplay.classList.remove('hidden');
        }

        // 开始处理逻辑
        startBtn.onclick = async () => {
            const file = videoInput.files[0] || (dropZone.files && dropZone.files[0]);
            if (!file) return alert('请先上传视频文件');

            const formData = new FormData();
            formData.append('video', file);
            formData.append('prompt', promptInput.value || '');

            try {
                startBtn.disabled = true;
                startBtn.textContent = '正在上传并启动任务...';
                
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (data.error) throw new Error(data.error);

                taskId = data.task_id;
                showProgress();
                startPollingProgress();
            } catch (err) {
                alert(`上传失败: ${err.message}`);
                startBtn.disabled = false;
                startBtn.textContent = '开始处理视频';
            }
        };

        function showProgress() {
            uploadSection.classList.add('hidden');
            progressSection.classList.remove('hidden');
        }

        function startPollingProgress() {
            pollingInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/status/${taskId}`);
                    const data = await response.json();

                    if (data.status === 'processing') {
                        const progress = data.progress || 0;
                        progressBar.style.width = `${progress}%`;
                        progressPercent.textContent = `${Math.round(progress)}%`;
                        progressDetail.textContent = `${data.processed_frames} / ${data.total_frames} 帧已处理`;
                        statusText.textContent = data.current_action || '正在处理中...';
                        logText.textContent = data.log || '正在生成标注...';
                    } else if (data.status === 'completed') {
                        clearInterval(pollingInterval);
                        showResult(data.video_url);
                    } else if (data.status === 'failed') {
                        clearInterval(pollingInterval);
                        alert(`任务失败: ${data.error}`);
                        window.location.reload();
                    }
                } catch (err) {
                    console.error('Polling error:', err);
                }
            }, 1000);
        }

        function showResult(videoUrl) {
            progressSection.classList.add('hidden');
            resultSection.classList.remove('hidden');
            resultVideo.src = videoUrl;
            downloadBtn.href = videoUrl;
        }
    </script>
</body>
</html>
